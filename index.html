<!DOCTYPE html>

<html> 
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=Edge">
        <link rel="stylesheet" href="CSS\stylesheet.css">

        <!-- FONTS -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Electrolize&family=Just+Another+Hand&family=Nunito+Sans:wght@700&display=swap" rel="stylesheet">
        
        <!-- TITLE AND ICON -->
        <title> LIU HAO DAVIDE</title>
        <link rel="icon" href="images/Profile.jpg">
    </head>


    <body> 
        <!-- HEAD -->
        <div id="header">
            <ul class="header">
                <li id="profile">
                        <a href="/"id="profileImage"> <img alt="PROFILE IMAGE" id="profileImage" src="images/Profile.jpg"> </a>
                </li>
                <li id="title">
                    LIU HAO DAVIDE
                </li>
            </ul>

            <!-- NAV -->
            <div id="tab">
                <a class="active" href="javascript:void(0)">Home</a>
                <a href="javascript:void(0)">News</a>
                <a href="javascript:void(0)">Contact</a>
            </div>
        </div>
        
        <script>
            window.onscroll = function() {onTop()};
            
            var navbar = document.getElementById("header");
            var sticky = navbar.offsetTop;
            
            function onTop() {
              if (window.pageYOffset >= sticky) {
                navbar.classList.add("sticky")
              } else {
                navbar.classList.remove("sticky");
              }
            }
        </script>
        
    </body>
</html>
